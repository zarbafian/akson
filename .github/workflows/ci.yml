name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked
      - name: Test
        run: cargo test --workspace --locked

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans sources

  xcheck:
    name: independent vector cross-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-checker
        run: pip install -r xcheck/requirements.txt
      - name: Cross-check golden vectors
        run: python xcheck/run.py spec/vectors

  isolation:
    name: sandbox isolation (permissive runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      # The clean worker (§13.1) needs unprivileged user namespaces, which recent
      # Ubuntu restricts via AppArmor. GitHub runners grant passwordless sudo, so
      # enable it for this job (the local host cannot, hence CI validates it).
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          unshare --user --map-root-user true && echo "user namespaces available"
      - name: seccomp + Landlock enforcement
        run: cargo test -p axon-sandbox --locked
      - name: live namespace/mount checklist (#[ignore] tests)
        run: cargo test -p axon-sandbox --locked -- --ignored
      - name: clean-worker end-to-end (work order → sandbox → gate)
        run: cargo test -p axon-harness --locked --test clean_worker_e2e -- --ignored --nocapture
      - name: interop — pairing over mTLS (two processes)
        run: bash harness/interop/scenario-pairing.sh
