# Interop scenario 1 (pairing over mTLS) as two containerised endpoints.
# FOSS + runtime-agnostic: runs under `podman compose` (preferred — daemonless,
# rootless, Apache-2.0) or `docker compose`. Build the image first:
#   podman build -f harness/interop/Containerfile -t axon-harness .
#   podman compose -f harness/interop/compose.yaml up --abort-on-container-exit
#
# endpoint-a serves and writes the invitation to the shared volume; endpoint-b
# waits for it and pairs. Success = endpoint-b prints "PAIRED with endpoint-a"
# and exits 0.
services:
  endpoint-a:
    image: axon-harness
    command:
      - serve
      - --state=/state/a.db
      - --seed=1
      - --host=0.0.0.0
      - --advertise=endpoint-a
      - --port=9443
      - --invitation-out=/shared/invitation.json
      - --agent=endpoint-a
    volumes:
      - shared:/shared
      - state-a:/state
    networks: [axon]

  endpoint-b:
    image: axon-harness
    # Wait for the invitation the inviter writes, then pair.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        for i in $(seq 1 100); do [ -s /shared/invitation.json ] && break; sleep 0.1; done;
        sleep 0.5;
        exec axon-harness pair --state=/state/b.db --seed=2 --invitation=/shared/invitation.json --agent=endpoint-b
    volumes:
      - shared:/shared
      - state-b:/state
    depends_on: [endpoint-a]
    networks: [axon]

volumes:
  shared:
  state-a:
  state-b:

networks:
  axon:
